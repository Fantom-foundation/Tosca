[package]
name = "benchmarks"
version = "0.1.0"
edition = "2021"

[features]
performance = ["evmrs/performance"]
mimalloc = ["evmrs/mimalloc"]
stack-array = ["evmrs/stack-array"]
message-slice-output-box = ["evmrs/message-slice-output-box"]
no-bounds-checks = ["evmrs/no-bounds-checks"]
jumptable = ["evmrs/jumptable"]
hash-cache = ["evmrs/hash-cache"]
jump-cache = ["evmrs/jump-cache"]

[dependencies]
evmrs = { path = ".." }
driver = { path = "../driver" }

[dev-dependencies]
criterion = "0.5.1"

[[bench]]
name = "interpreter"
harness = false
